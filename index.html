<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

<h1>Job Application Tracker</h1>


<div class="dashboard">
  <div class="dash-card">
    <h4>Total</h4>
    <h2 id="totalCount">0</h2>
  </div>
  <div class="dash-card">
    <h4>Interview</h4>
    <h2 id="interviewCount">0</h2>
  </div>
  <div class="dash-card">
    <h4>Rejected</h4>
    <h2 id="rejectedCount">0</h2>
  </div>
</div>


<div class="section-header">
  <h2>Available Jobs</h2>
  <span id="jobsCount"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="changeTab('all',event)">All</button>
  <button class="tab" onclick="changeTab('interview',event)">Interview</button>
  <button class="tab" onclick="changeTab('rejected',event)">Rejected</button>
</div>

<div id="jobsContainer" class="jobs"></div>

</div>


<script src="apps.js"></script>
</body>
</html>
